<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="darkreader-lock" />
    <title>A2Z DSA :: OPS DECK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* ===== DESIGN TOKENS — "DSA OPS DECK" ===== */
        --void: #04070a;
        --void-2: #070c11;
        --panel: #0b131a;
        --panel-2: #0e1922;
        --panel-glass: rgba(13, 23, 31, 0.6);
        --line: rgba(120, 190, 210, 0.16);
        --line-bright: rgba(120, 220, 230, 0.35);

        --cyan: #00e5ff;
        --cyan-dim: #0a8fa8;
        --mint: #39ffb0;
        --mint-dim: #0f9d6e;
        --amber: #ffb020;
        --red: #ff3b5c;
        --violet: #8a7bff;

        --text-hi: #eaf6ff;
        --text: #b9cbd8;
        --text-dim: #6d8494;

        --font-display: "Orbitron", "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "Consolas", monospace;
        --font-readable: "Rajdhani", "Segoe UI", sans-serif;

        --radius: 10px;
        --progress-width: 0%;
      }

      * {
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }

      @media (max-width: 768px) {
        html {
          font-size: 14px;
        }
      }

      @media (max-width: 480px) {
        html {
          font-size: 12.5px;
        }

        h1.brand-title {
          font-size: 1.7rem !important;
        }

        .collapsible {
          font-size: 1.15rem;
        }

        .sub-collapsible {
          font-size: 1rem;
        }
      }

      ::selection {
        background: var(--mint);
        color: #012018;
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: var(--void);
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(var(--cyan-dim), var(--mint-dim));
        border-radius: 6px;
      }

      /* ===== BACKGROUND LAYERS ===== */
      html,
      body {
        height: 100%;
      }

      body {
        font-family: var(--font-mono);
        line-height: 1.6;
        background: var(--void);
        color: var(--text);
        margin: 0;
        padding: 1rem;
        position: relative;
        overflow-x: hidden;
      }

      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.85;
      }

      /* floating ambient blobs — pure CSS, no mouse interaction */
      .bg-blobs {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .bg-blobs .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        will-change: transform;
      }

      .bg-blobs .b1 {
        width: 560px;
        height: 560px;
        top: -12%;
        left: -10%;
        background: radial-gradient(
          circle,
          rgba(0, 229, 255, 0.5),
          transparent 70%
        );
        animation: float-a 18s ease-in-out infinite;
      }

      .bg-blobs .b2 {
        width: 620px;
        height: 620px;
        bottom: -18%;
        right: -12%;
        background: radial-gradient(
          circle,
          rgba(57, 255, 176, 0.42),
          transparent 70%
        );
        animation: float-b 22s ease-in-out infinite;
      }

      .bg-blobs .b3 {
        width: 460px;
        height: 460px;
        top: 38%;
        left: 56%;
        background: radial-gradient(
          circle,
          rgba(138, 123, 255, 0.4),
          transparent 70%
        );
        animation: float-c 15s ease-in-out infinite;
      }

      .bg-blobs .b4 {
        width: 400px;
        height: 400px;
        top: 68%;
        left: 4%;
        background: radial-gradient(
          circle,
          rgba(0, 229, 255, 0.32),
          transparent 70%
        );
        animation: float-d 20s ease-in-out infinite;
      }

      .bg-blobs .b5 {
        width: 340px;
        height: 340px;
        top: 8%;
        left: 42%;
        background: radial-gradient(
          circle,
          rgba(255, 176, 32, 0.22),
          transparent 70%
        );
        animation: float-e 26s ease-in-out infinite;
      }

      @keyframes float-a {
        0%,
        100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        50% {
          transform: translate(140px, 160px) scale(1.25) rotate(20deg);
        }
      }

      @keyframes float-b {
        0%,
        100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        50% {
          transform: translate(-160px, -110px) scale(1.18) rotate(-18deg);
        }
      }

      @keyframes float-c {
        0%,
        100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        50% {
          transform: translate(-120px, 140px) scale(0.82) rotate(24deg);
        }
      }

      @keyframes float-d {
        0%,
        100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        50% {
          transform: translate(110px, -130px) scale(1.3) rotate(-22deg);
        }
      }

      @keyframes float-e {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-90px, 100px) scale(1.35);
        }
      }

      body::before {
        /* grid floor */
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: radial-gradient(
          ellipse 150% 120% at 50% 10%,
          black 35%,
          transparent 95%
        );
        animation: grid-drift 22s linear infinite;
      }

      body::after {
        /* vignette */
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
          1100px 800px at 50% 120%,
          rgba(4, 7, 10, 0.55),
          transparent 60%
        );
      }

      @keyframes grid-drift {
        from {
          background-position:
            0 0,
            0 0;
        }
        to {
          background-position:
            42px 42px,
            42px 42px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          animation: none;
        }
        .bg-blobs .blob {
          animation: none;
        }
      }

      /* ===== MAIN CONTAINER ===== */
      .container {
        max-width: 1200px;
        margin: 1rem auto;
        background: var(--panel-glass);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 1.25rem 1.5rem 2rem;
        border-radius: 16px;
        box-shadow:
          0 0 0 1px var(--line),
          0 20px 60px rgba(0, 0, 0, 0.55),
          0 0 80px rgba(0, 229, 255, 0.05) inset;
        border: 1px solid var(--line);
        position: relative;
        z-index: 1;
      }

      /* ===== HEADER / HUD ===== */
      .roadmap-header {
        position: relative;
        margin-bottom: 1.75rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.35em;
        color: var(--cyan);
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 0.5rem;
        opacity: 0.85;
      }

      .eyebrow::before,
      .eyebrow::after {
        content: "//";
        color: var(--text-dim);
        margin: 0 0.6em;
      }

      h1.brand-title {
        text-align: center;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 2.4rem;
        letter-spacing: 0.04em;
        margin: 0;
        color: var(--text-hi);
        text-shadow:
          0 0 18px rgba(0, 229, 255, 0.35),
          0 0 46px rgba(0, 229, 255, 0.12);
      }

      h1.brand-title .bracket {
        color: var(--mint);
        text-shadow: 0 0 18px rgba(57, 255, 176, 0.5);
      }

      .subtitle {
        text-align: center;
        color: var(--text-dim);
        font-size: 0.85rem;
        margin-top: 0.5rem;
        letter-spacing: 0.02em;
      }

      .subtitle .hype {
        color: var(--mint);
        font-weight: 700;
        text-shadow: 0 0 12px rgba(57, 255, 176, 0.6);
      }

      /* HUD stats row */
      .hud-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.75rem;
        flex-wrap: wrap;
        margin-top: 1.5rem;
      }

      .gauge-wrap {
        position: relative;
        width: 116px;
        height: 116px;
        flex-shrink: 0;
      }

      .gauge-wrap svg {
        transform: rotate(-90deg);
        width: 100%;
        height: 100%;
      }

      .gauge-track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 8;
      }

      .gauge-fill {
        fill: none;
        stroke: url(#gaugeGradient);
        stroke-width: 8;
        stroke-linecap: round;
        transition: stroke-dashoffset 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.65));
      }

      .gauge-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .gauge-pct {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.35rem;
        color: var(--text-hi);
      }

      .gauge-label {
        font-size: 0.55rem;
        letter-spacing: 0.12em;
        color: var(--text-dim);
        text-transform: uppercase;
        margin-top: 2px;
      }

      .stat-chips {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .stat-chip {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.5rem 0.9rem;
        text-align: center;
        min-width: 84px;
      }

      .stat-chip .num {
        display: block;
        font-family: var(--font-display);
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text-hi);
      }

      .stat-chip.mint .num {
        color: var(--mint);
        text-shadow: 0 0 10px rgba(57, 255, 176, 0.45);
      }
      .stat-chip.amber .num {
        color: var(--amber);
        text-shadow: 0 0 10px rgba(255, 176, 32, 0.4);
      }
      .stat-chip.red .num {
        color: var(--red);
        text-shadow: 0 0 10px rgba(255, 59, 92, 0.4);
      }

      .stat-chip .lbl {
        font-size: 0.62rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .toggle-all-btn {
        cursor: pointer;
        border: 1px solid var(--line-bright);
        background: linear-gradient(
          180deg,
          rgba(0, 229, 255, 0.1),
          rgba(0, 229, 255, 0.03)
        );
        color: var(--cyan);
        font-family: var(--font-mono);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.55rem 1.1rem;
        border-radius: 999px;
        font-size: 0.75rem;
        transition: all 0.25s ease;
        display: block;
        margin: 1.25rem auto 0;
      }

      .toggle-all-btn:hover {
        background: rgba(0, 229, 255, 0.16);
        box-shadow: 0 0 18px rgba(0, 229, 255, 0.35);
        transform: translateY(-1px);
      }

      /* ===== COLLAPSIBLE MODULE CARDS ===== */
      .collapsible,
      .sub-collapsible {
        color: var(--text-hi);
        cursor: pointer;
        padding: 0.9rem 1.25rem;
        width: 100%;
        border: 1px solid var(--line);
        text-align: left;
        outline: none;
        margin-top: 0.85rem;
        border-radius: var(--radius);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease,
          background-color 0.3s ease;
        position: relative;
        overflow: hidden;
        z-index: 1;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.025),
          rgba(255, 255, 255, 0)
        );
        font-family: var(--font-display);
      }

      .collapsible {
        font-size: 1.32rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        border-left: 3px solid var(--cyan-dim);
      }

      .sub-collapsible {
        font-family: var(--font-readable);
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        border-left: 3px solid var(--violet);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.015),
          rgba(255, 255, 255, 0)
        );
      }

      .sub-collapsible .sub-index {
        font-family: var(--font-mono);
        font-size: 0.82em;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      /* progress fill bar */
      .collapsible::before,
      .sub-collapsible::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: var(--progress-width, 0%);
        background: linear-gradient(
          90deg,
          rgba(0, 229, 255, 0.16),
          rgba(0, 229, 255, 0.05)
        );
        transition:
          width 0.5s cubic-bezier(0.16, 1, 0.3, 1),
          background-color 0.4s ease;
        z-index: 1;
        border-right: 2px solid rgba(0, 229, 255, 0.55);
      }

      .collapsible:hover,
      .collapsible.active {
        border-left-color: var(--cyan);
        box-shadow:
          0 0 22px rgba(0, 229, 255, 0.12),
          inset 0 0 30px rgba(0, 229, 255, 0.03);
      }

      .sub-collapsible:hover,
      .sub-collapsible.active {
        border-left-color: var(--violet);
        box-shadow: 0 0 18px rgba(138, 123, 255, 0.14);
      }

      .collapsible.completed,
      .sub-collapsible.completed {
        border-left-color: var(--mint);
      }

      .collapsible.completed::before,
      .sub-collapsible.completed::before {
        background: linear-gradient(
          90deg,
          rgba(57, 255, 176, 0.22),
          rgba(57, 255, 176, 0.06)
        );
        border-right-color: var(--mint);
      }

      .collapsible.completed:hover,
      .collapsible.completed.active,
      .sub-collapsible.completed:hover,
      .sub-collapsible.completed.active {
        box-shadow: 0 0 24px rgba(57, 255, 176, 0.22);
      }

      .collapsible-title {
        flex-grow: 1;
        position: relative;
        z-index: 2;
      }

      .step-index {
        color: var(--cyan);
        margin-right: 0.5rem;
        font-size: 0.85em;
        opacity: 0.8;
      }

      .completed .step-index,
      .completed .sub-index {
        color: var(--mint);
      }

      .progress-counter {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        font-weight: 600;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        white-space: nowrap;
        position: relative;
        z-index: 2;
      }

      .completed .progress-counter {
        color: var(--mint);
        border-color: rgba(57, 255, 176, 0.4);
      }

      .collapsible::after,
      .sub-collapsible::after {
        content: "+";
        font-size: 1.4em;
        font-weight: bold;
        transition:
          transform 0.3s ease,
          color 0.3s ease;
        margin-left: 0.25rem;
        color: var(--cyan);
        position: relative;
        z-index: 2;
      }

      .sub-collapsible::after {
        color: var(--violet);
      }

      .collapsible.completed::after,
      .sub-collapsible.completed::after {
        color: var(--mint);
      }

      .collapsible.active::after,
      .sub-collapsible.active::after {
        transform: rotate(45deg);
      }

      .content,
      .sub-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease-in-out;
        background: transparent;
      }

      .content {
        padding: 0 0.25rem;
      }

      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: var(--radius);
        margin-top: 0.75rem;
      }

      /* ===== DATA TABLE ("LOG") ===== */
      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--line);
        table-layout: fixed;
        min-width: 820px;
        background: rgba(255, 255, 255, 0.01);
      }

      th,
      td {
        border: 1px solid var(--line);
        padding: 0.5rem 0.35rem;
        text-align: center;
        vertical-align: middle;
        word-wrap: break-word;
      }

      .topic-cell {
        text-align: left;
        font-weight: 500;
        width: 38%;
      }

      thead th:not(:first-child),
      tbody td:not(.topic-cell) {
        width: 7.75%;
      }

      .topic-title {
        font-size: 0.9rem;
        padding: 0.4rem 0.5rem;
        color: var(--text-hi);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .diff-badge {
        font-family: var(--font-mono);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 0.12rem 0.4rem;
        border-radius: 4px;
        flex-shrink: 0;
        border: 1px solid currentColor;
      }

      .difficulty-easy .diff-badge {
        color: var(--mint);
        background: rgba(57, 255, 176, 0.08);
      }
      .difficulty-medium .diff-badge {
        color: var(--amber);
        background: rgba(255, 176, 32, 0.08);
      }
      .difficulty-hard .diff-badge {
        color: var(--red);
        background: rgba(255, 59, 92, 0.08);
      }

      thead th {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-dim);
        font-weight: 700;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-family: var(--font-mono);
      }

      tr {
        color: var(--text);
        transition: background-color 0.3s ease;
      }

      tbody tr:hover {
        background: rgba(0, 229, 255, 0.04);
      }

      .difficulty-easy td:first-child {
        box-shadow: inset 4px 0 0 0 var(--mint);
      }
      .difficulty-medium td:first-child {
        box-shadow: inset 4px 0 0 0 var(--amber);
      }
      .difficulty-hard td:first-child {
        box-shadow: inset 4px 0 0 0 var(--red);
      }

      tr.completed {
        background: rgba(57, 255, 176, 0.06) !important;
        color: #c9ffe9 !important;
      }

      tr.completed .topic-title {
        color: #eafff6;
      }

      tr.completed a {
        color: var(--mint) !important;
      }

      tr.just-completed {
        animation: row-flash 0.7s ease;
      }

      @keyframes row-flash {
        0% {
          background: rgba(57, 255, 176, 0.45);
        }
        100% {
          background: rgba(57, 255, 176, 0.06);
        }
      }

      /* link icon buttons */
      .link-cell {
        cursor: pointer;
      }

      .link-cell a {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: -0.5rem -0.35rem;
        padding: 0.45rem;
        color: var(--text-dim);
        text-decoration: none;
        height: 100%;
        transition:
          color 0.2s ease,
          transform 0.2s ease,
          filter 0.2s ease;
      }

      .link-cell a:hover {
        color: var(--cyan);
        transform: translateY(-2px) scale(1.12);
        filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.7));
      }

      .link-cell svg {
        width: 19px;
        height: 19px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
      }

      .na-cell {
        color: rgba(255, 255, 255, 0.12);
        font-size: 1rem;
        font-weight: 600;
      }

      /* ===== TERMINAL CHECKBOX ===== */
      .status-cell {
        cursor: pointer;
        position: relative;
      }

      .status-checkbox {
        -webkit-appearance: none;
        appearance: none;
        background: rgba(255, 255, 255, 0.02);
        margin: auto;
        font: inherit;
        color: var(--text-dim);
        width: 1.35em;
        height: 1.35em;
        border: 0.14em solid currentColor;
        border-radius: 5px;
        display: grid;
        place-content: center;
        pointer-events: none;
        position: relative;
        transition:
          border-color 0.25s ease,
          box-shadow 0.25s ease,
          background-color 0.25s ease;
      }

      .status-checkbox::before {
        content: "";
        width: 0.7em;
        height: 0.7em;
        clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        transform: scale(0);
        transform-origin: bottom left;
        transition: 160ms transform cubic-bezier(0.4, 1.6, 0.6, 1);
        box-shadow: inset 1em 1em var(--mint);
      }

      .status-checkbox:checked {
        border-color: var(--mint);
        background: rgba(57, 255, 176, 0.08);
        box-shadow: 0 0 12px rgba(57, 255, 176, 0.55);
      }

      .status-checkbox:checked::before {
        transform: scale(1);
      }

      .status-checkbox.pulse {
        animation: check-pulse 0.55s ease;
      }

      @keyframes check-pulse {
        0% {
          box-shadow: 0 0 0 rgba(57, 255, 176, 0.8);
        }
        35% {
          box-shadow: 0 0 22px 6px rgba(57, 255, 176, 0.55);
        }
        100% {
          box-shadow: 0 0 12px rgba(57, 255, 176, 0.55);
        }
      }

      /* particle burst spans */
      .burst-particle {
        position: fixed;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--mint);
        pointer-events: none;
        z-index: 999;
        box-shadow: 0 0 8px var(--mint);
        animation: burst-fly 0.65s ease-out forwards;
      }

      @keyframes burst-fly {
        to {
          transform: translate(var(--dx), var(--dy)) scale(0);
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .status-checkbox.pulse,
        tr.just-completed,
        .burst-particle {
          animation: none !important;
        }
      }

      /* focus visibility for a11y */
      a:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
      }

      footer.deck-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--line);
        color: var(--text-dim);
        font-size: 0.68rem;
        letter-spacing: 0.08em;
      }

      footer.deck-footer span {
        color: var(--mint);
      }
    </style>
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="bg-blobs" aria-hidden="true">
      <span class="blob b1"></span>
      <span class="blob b2"></span>
      <span class="blob b3"></span>
      <span class="blob b4"></span>
      <span class="blob b5"></span>
    </div>
    <div id="roadmap-container" class="container">
      <div class="eyebrow">BRAIN.EXE COMPILING...</div>
      <h1 class="brand-title">
        <span class="bracket">[</span> LOADING ROADMAP
        <span class="bracket">]</span>
      </h1>
    </div>

    <script>
      const STORAGE_KEY = "dsaRoadmapProgress";
      let TOTAL_TOPICS = 0;

      const platformIcons = {
        BLOG: {
          title: "Article",
          svg: '<svg viewBox="0 0 24 24"><path d="M6 4h9l3 3v13H6z"/><path d="M15 4v3h3"/><path d="M9 12h6M9 16h6M9 8h2"/></svg>',
        },
        YT: {
          title: "Video",
          svg: '<svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>',
        },
        LC: {
          title: "LeetCode",
          svg: '<svg viewBox="0 0 24 24"><path d="M13 3l-7 8 4 4"/><path d="M8 15l3 3a4 4 0 0 0 6-1"/><path d="M9 12h9"/></svg>',
        },
        GFG: {
          title: "GeeksforGeeks",
          svg: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
 <g stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="butt"
                  stroke-linejoin="miter">

                  <!-- Left -->
                  <path d="M10.8 12H1.6"/>
                  <path d="M4.2 7.1
                          A4.8 4.8 0 1 1 4.2 16.9"/>
                  <path d="M2.3 13.6H9.9"/>

                  <!-- Right -->
                  <path d="M13.2 12H22.4"/>
                  <path d="M19.8 7.1
                          A4.8 4.8 0 1 0 19.8 16.9"/>
                  <path d="M14.1 13.6H21.7"/>

                </g>
              </svg>`,
        },
        CN: {
          title: "CodingNinjas",
          svg: '<svg viewBox="0 0 24 24"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg>',
        },
        TUF: {
          title: "takeUforward+",
          svg: '<svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>',
        },
      };

      document.addEventListener("DOMContentLoaded", () => {
        initBackground();
        fetch("a2z.json")
          .then((response) => {
            if (!response.ok)
              throw new Error(
                "Network response was not ok. Make sure a2z.json is in the same folder.",
              );
            return response.json();
          })
          .then((roadmapData) => {
            const progress = loadCompletionState();
            generateRoadmap(roadmapData, progress);
            addEventListeners();
            updateOverallHUD();
          })
          .catch(handleError);
      });

      /* =============== AMBIENT BACKGROUND PARTICLES =============== */
      function initBackground() {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");
        const reduceMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;
        let w,
          h,
          particles = [];

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        const count = Math.min(
          130,
          Math.floor((window.innerWidth * window.innerHeight) / 13000),
        );
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 2.2 + 0.7,
            vx: (Math.random() - 0.5) * 0.28,
            vy: (Math.random() - 0.5) * 0.28,
            hue: Math.random() > 0.5 ? "0,229,255" : "57,255,176",
            tw: Math.random() * Math.PI * 2,
          });
        }

        const LINK_DIST = 130;

        function draw() {
          ctx.clearRect(0, 0, w, h);

          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            for (let j = i + 1; j < particles.length; j++) {
              const q = particles[j];
              const dx = p.x - q.x,
                dy = p.y - q.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < LINK_DIST) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(q.x, q.y);
                ctx.strokeStyle = `rgba(0, 229, 255, ${0.16 * (1 - dist / LINK_DIST)})`;
                ctx.lineWidth = 1;
                ctx.stroke();
              }
            }
          }

          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.tw += 0.03;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
            const twinkle = 0.55 + Math.sin(p.tw) * 0.35;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${p.hue},${twinkle})`;
            ctx.shadowColor = `rgba(${p.hue},0.9)`;
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
          }
          if (!reduceMotion) requestAnimationFrame(draw);
        }
        draw();
      }

      /* =============== ROADMAP RENDERING =============== */
      function generateRoadmap(data, progress) {
        const container = document.getElementById("roadmap-container");
        TOTAL_TOPICS = 0;
        const grandTotal = data.reduce(
          (sum, step) =>
            sum +
            (step.sub_steps || []).reduce(
              (s2, sub) => s2 + (sub.topics ? sub.topics.length : 0),
              0,
            ),
          0,
        );

        let htmlContent = `
                <div class="eyebrow">BRAIN.EXE COMPILING :: STATUS: LOCKED IN</div>
                <div class="roadmap-header">
                    <h1 class="brand-title"><span class="bracket">[</span> A2Z DSA <span class="bracket">]</span> OPS DECK</h1>
                   <p class="subtitle">${grandTotal} problems between you and him. <span class="hype">Delulu is the solulu</span> — status: cooked (in a good way). Let's cook. 👨‍🍳</p>
                    <div class="hud-row">
                        <div class="gauge-wrap">
                            <svg viewBox="0 0 120 120">
                                <defs>
                                    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#00e5ff"/>
                                        <stop offset="100%" stop-color="#39ffb0"/>
                                    </linearGradient>
                                </defs>
                                <circle class="gauge-track" cx="60" cy="60" r="52"></circle>
                                <circle id="gauge-fill" class="gauge-fill" cx="60" cy="60" r="52"></circle>
                            </svg>
                            <div class="gauge-center">
                                <span class="gauge-pct" id="gauge-pct">0%</span>
                                <span class="gauge-label">Cleared</span>
                            </div>
                        </div>
                        <div class="stat-chips">
                            <div class="stat-chip mint"><span class="num" id="stat-done">0</span><span class="lbl">Solved</span></div>
                            <div class="stat-chip"><span class="num" id="stat-total">0</span><span class="lbl">Total</span></div>
                            <div class="stat-chip"><span class="num" id="stat-remaining">0</span><span class="lbl">Remaining</span></div>
                        </div>
                    </div>
                    <button type="button" id="toggle-all" class="toggle-all-btn">Expand All</button>
                </div>`;

        data.forEach((step) => {
          let totalStepTopics = 0;
          let completedStepTopics = 0;
          let subStepsHtml = "";
          if (step.sub_steps) {
            step.sub_steps.forEach((subStep) => {
              const totalSubStepTopics = subStep.topics.length;
              const completedSubStepTopics = subStep.topics.filter(
                (t) => progress[t.id],
              ).length;
              const isSubStepComplete =
                totalSubStepTopics > 0 &&
                completedSubStepTopics === totalSubStepTopics;
              const subStepProgressClass = isSubStepComplete ? "completed" : "";
              const subStepPercentage =
                totalSubStepTopics > 0
                  ? (completedSubStepTopics / totalSubStepTopics) * 100
                  : 0;
              totalStepTopics += totalSubStepTopics;
              completedStepTopics += completedSubStepTopics;

              subStepsHtml += `
                                <button type="button" class="sub-collapsible ${subStepProgressClass}" style="--progress-width: ${subStepPercentage}%" data-step="${step.step_no}" data-substep="${subStep.sub_step_no}">
                                    <span class="collapsible-title"><span class="sub-index">${step.step_no}.${subStep.sub_step_no}</span> ${subStep.sub_step_title.replace(/\n/g, " ")}</span>
                                    <span class="progress-counter">${completedSubStepTopics}/${totalSubStepTopics}</span>
                                </button>
                                <div class="sub-content">
                                    <div class="table-container">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>Topic</th>
                                                    <th title="Article">BLOG</th>
                                                    <th title="Video">YT</th>
                                                    <th title="LeetCode">LC</th>
                                                    <th title="GeeksForGeeks">GFG</th>
                                                    <th title="CodingNinjas">CN</th>
                                                    <th title="takeUforward+">TUF</th>
                                                    <th>Done</th>
                                                </tr>
                                            </thead>
                                            <tbody>`;
              subStep.topics.forEach((topic) => {
                const isCompleted = progress[topic.id] || false;
                const difficultyClass = getDifficultyClass(topic.difficulty);
                const difficultyLabel =
                  ["EASY", "MED", "HARD"][topic.difficulty] || "";
                const completedClass = isCompleted ? "completed" : "";
                const checkedAttr = isCompleted ? "checked" : "";

                let tags = "";
                if (topic.ques_topic) {
                  try {
                    const parsedTags = JSON.parse(topic.ques_topic);
                    tags = parsedTags.map((t) => t.label).join(", ");
                  } catch (e) {
                    console.error(
                      "Failed to parse ques_topic:",
                      topic.ques_topic,
                      e,
                    );
                  }
                }

                subStepsHtml += `
                                                <tr class="${difficultyClass} ${completedClass}" data-topic-id="${topic.id}">
                                                    <td class="topic-cell" title="${tags}">
                                                        <div class="topic-title">${difficultyLabel ? `<span class="diff-badge">${difficultyLabel}</span>` : ""}${topic.question_title}</div>
                                                    </td>
                                                    ${createLinkCell(topic.post_link, "BLOG")}
                                                    ${createLinkCell(topic.yt_link, "YT")}
                                                    ${createLinkCell(topic.lc_link, "LC")}
                                                    ${createLinkCell(topic.gfg_link, "GFG")}
                                                    ${createLinkCell(topic.cs_link, "CN")}
                                                    ${createLinkCell(topic.plus_link, "TUF")}
                                                    <td class="status-cell">
                                                        <input type="checkbox" class="status-checkbox" data-id="${topic.id}" ${checkedAttr}>
                                                    </td>
                                                </tr>`;
              });
              subStepsHtml += `
                                            </tbody>
                                        </table>
                                    </div>
                                </div>`;
            });
          }
          TOTAL_TOPICS += totalStepTopics;
          const isStepComplete =
            totalStepTopics > 0 && completedStepTopics === totalStepTopics;
          const stepProgressClass = isStepComplete ? "completed" : "";
          const stepPercentage =
            totalStepTopics > 0
              ? (completedStepTopics / totalStepTopics) * 100
              : 0;
          htmlContent += `
                            <button type="button" class="collapsible ${stepProgressClass}" style="--progress-width: ${stepPercentage}%" data-step="${step.step_no}">
                                <span class="collapsible-title"><span class="step-index">STEP ${String(step.step_no).padStart(2, "0")}</span>${step.step_title}</span>
                                <span class="progress-counter">${completedStepTopics}/${totalStepTopics}</span>
                            </button>
                            <div class="content">${subStepsHtml}</div>`;
        });

        htmlContent += `
                <footer class="deck-footer">END OF ROADMAP <span>::</span> KEEP SHIPPING <span>[✓]</span></footer>`;

        container.innerHTML = htmlContent;
      }

      function createLinkCell(url, label) {
        if (url) {
          const icon = platformIcons[label] || { title: label, svg: label };
          return `<td class="link-cell"><a href="${url}" target="_blank" rel="noopener noreferrer" title="${icon.title}">${icon.svg}</a></td>`;
        } else {
          return `<td class="na-cell">&mdash;</td>`;
        }
      }

      function getDifficultyClass(difficulty) {
        return (
          ["difficulty-easy", "difficulty-medium", "difficulty-hard"][
            difficulty
          ] || ""
        );
      }

      function loadCompletionState() {
        try {
          const savedProgress = localStorage.getItem(STORAGE_KEY);
          return savedProgress ? JSON.parse(savedProgress) : {};
        } catch (e) {
          console.error("Failed to load progress from localStorage", e);
          return {};
        }
      }

      function saveCompletionState(progress) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        } catch (e) {
          console.error("Failed to save progress to localStorage", e);
        }
      }

      /* =============== OVERALL HUD GAUGE =============== */
      function updateOverallHUD() {
        const progress = loadCompletionState();
        const allCheckboxes = document.querySelectorAll(".status-checkbox");
        const total = allCheckboxes.length || TOTAL_TOPICS;
        const done = Array.from(allCheckboxes).filter(
          (cb) => progress[cb.dataset.id],
        ).length;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;

        const fillEl = document.getElementById("gauge-fill");
        const pctEl = document.getElementById("gauge-pct");
        const doneEl = document.getElementById("stat-done");
        const totalEl = document.getElementById("stat-total");
        const remEl = document.getElementById("stat-remaining");
        if (!fillEl) return;

        const r = 52;
        const circumference = 2 * Math.PI * r;
        fillEl.style.strokeDasharray = `${circumference}`;
        fillEl.style.strokeDashoffset = `${circumference * (1 - pct / 100)}`;
        pctEl.textContent = `${pct}%`;
        doneEl.textContent = done;
        totalEl.textContent = total;
        remEl.textContent = total - done;
      }

      function updateCounters(element) {
        const progress = loadCompletionState();
        const subStepContent = element.closest(".sub-content");
        if (subStepContent) {
          const subStepButton = subStepContent.previousElementSibling;
          const topicsInSubStep = Array.from(
            subStepContent.querySelectorAll(".status-checkbox"),
          );
          const totalSubStep = topicsInSubStep.length;
          const completedSubStep = topicsInSubStep.filter(
            (cb) => progress[cb.dataset.id],
          ).length;
          subStepButton.querySelector(".progress-counter").textContent =
            `${completedSubStep}/${totalSubStep}`;

          const subStepPercentage =
            totalSubStep > 0 ? (completedSubStep / totalSubStep) * 100 : 0;
          subStepButton.style.setProperty(
            "--progress-width",
            `${subStepPercentage}%`,
          );
          subStepButton.classList.toggle(
            "completed",
            totalSubStep > 0 && completedSubStep === totalSubStep,
          );
        }
        const mainContent = element.closest(".content");
        if (mainContent) {
          const mainStepButton = mainContent.previousElementSibling;
          const topicsInStep = Array.from(
            mainContent.querySelectorAll(".status-checkbox"),
          );
          const totalStep = topicsInStep.length;
          const completedStep = topicsInStep.filter(
            (cb) => progress[cb.dataset.id],
          ).length;
          mainStepButton.querySelector(".progress-counter").textContent =
            `${completedStep}/${totalStep}`;

          const stepPercentage =
            totalStep > 0 ? (completedStep / totalStep) * 100 : 0;
          mainStepButton.style.setProperty(
            "--progress-width",
            `${stepPercentage}%`,
          );
          mainStepButton.classList.toggle(
            "completed",
            totalStep > 0 && completedStep === totalStep,
          );
        }
        updateOverallHUD();
      }

      /* =============== PARTICLE BURST ON CHECK =============== */
      function spawnBurst(originEl) {
        const rect = originEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const n = window.matchMedia("(prefers-reduced-motion: reduce)").matches
          ? 0
          : 10;
        for (let i = 0; i < n; i++) {
          const p = document.createElement("span");
          p.className = "burst-particle";
          const angle = (Math.PI * 2 * i) / n + Math.random() * 0.4;
          const dist = 26 + Math.random() * 24;
          p.style.left = `${cx}px`;
          p.style.top = `${cy}px`;
          p.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
          p.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);
          if (Math.random() > 0.5) p.style.background = "var(--cyan)";
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 700);
        }
      }

      function addEventListeners() {
        const container = document.getElementById("roadmap-container");
        const toggleAllBtn = document.getElementById("toggle-all");

        function updateToggleAllLabel() {
          if (!toggleAllBtn) return;
          const hasExpanded = container.querySelector(
            ".collapsible.active, .sub-collapsible.active",
          );
          toggleAllBtn.textContent = hasExpanded
            ? "Collapse All"
            : "Expand All";
        }

        container.addEventListener("click", function (event) {
          const collapsible = event.target.closest(
            ".collapsible, .sub-collapsible",
          );
          const statusCell = event.target.closest(".status-cell");

          if (collapsible) {
            collapsible.classList.toggle("active");
            const content = collapsible.nextElementSibling;
            if (content.style.maxHeight) {
              content.style.maxHeight = null;
            } else {
              content.style.maxHeight = content.scrollHeight + "px";
              const parentContent = content.closest(".content");
              if (parentContent && parentContent.style.maxHeight) {
                parentContent.style.maxHeight =
                  parentContent.scrollHeight + content.scrollHeight + "px";
              }
            }
            updateToggleAllLabel();
          }

          if (statusCell) {
            const checkbox = statusCell.querySelector(".status-checkbox");
            if (checkbox) {
              checkbox.checked = !checkbox.checked;
              const topicId = checkbox.dataset.id;
              const isChecked = checkbox.checked;
              const progress = loadCompletionState();
              progress[topicId] = isChecked;
              saveCompletionState(progress);
              const row = checkbox.closest("tr");
              row.classList.toggle("completed", isChecked);
              if (isChecked) {
                checkbox.classList.remove("pulse");
                void checkbox.offsetWidth;
                checkbox.classList.add("pulse");
                spawnBurst(checkbox);
                row.classList.remove("just-completed");
                void row.offsetWidth;
                row.classList.add("just-completed");
              }
              updateCounters(checkbox);
            }
          }
        });

        if (toggleAllBtn) {
          toggleAllBtn.addEventListener("click", function () {
            const allButtons = Array.from(
              container.querySelectorAll(".collapsible, .sub-collapsible"),
            );
            const hasExpanded = allButtons.some((b) =>
              b.classList.contains("active"),
            );

            if (!hasExpanded) {
              const subButtons = Array.from(
                container.querySelectorAll(".sub-collapsible"),
              );
              subButtons.forEach((btn) => {
                btn.classList.add("active");
                const content = btn.nextElementSibling;
                if (content) content.style.maxHeight = "none";
              });

              const mainButtons = Array.from(
                container.querySelectorAll(".collapsible"),
              );
              mainButtons.forEach((btn) => {
                btn.classList.add("active");
                const content = btn.nextElementSibling;
                if (content) content.style.maxHeight = "none";
              });
            } else {
              const allContents = Array.from(
                container.querySelectorAll(".content, .sub-content"),
              );
              allButtons.forEach((btn) => btn.classList.remove("active"));
              allContents.forEach((c) => (c.style.maxHeight = null));
            }

            updateToggleAllLabel();
          });
        }

        updateToggleAllLabel();
      }

      function handleError(error) {
        console.error("Error:", error);
        const container = document.getElementById("roadmap-container");
        container.innerHTML = `
                <h1 class="brand-title">[ ERROR ]</h1>
                <p>Could not load the roadmap. Please ensure 'a2z.json' is in the same directory and correctly formatted.</p>
                <p><em>${error.message}</em></p>`;
      }
    </script>
  </body>
